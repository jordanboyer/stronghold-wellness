// Timer component
function Timer({ duration, onComplete }) {
  const [timeLeft, setTimeLeft] = useState(duration);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running && timeLeft > 0) {
      intervalRef.current = setInterval(() => {
        setTimeLeft((t) => {
          if (t <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            onComplete?.();
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, timeLeft]);

  const reset = () => {
    clearInterval(intervalRef.current);
    setTimeLeft(duration);
    setRunning(false);
  };

  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 20, color: HOTEL_CONFIG.accent, minWidth: 60 }}>
        {mins}:{secs.toString().padStart(2, "0")}
      </span>
      <button
        onClick={() => setRunning(!running)}
        style={{
          background: running ? "rgba(201,168,76,0.15)" : HOTEL_CONFIG.accent,
          color: running ? HOTEL_CONFIG.accent : HOTEL_CONFIG.dark,
          border: "none",
          borderRadius: 6,
          padding: "6px 16px",
          fontSize: 12,
          fontWeight: 700,
          letterSpacing: 1,
          cursor: "pointer",
          fontFamily: "'Outfit', sans-serif",
        }}
      >
        {running ? "PAUSE" : timeLeft < duration ? "RESUME" : "START"}
      </button>
      {timeLeft < duration && (
        <button
          onClick={reset}
          style={{
            background: "transparent",
            color: HOTEL_CONFIG.textSecondary,
            border: `1px solid rgba(138,154,176,0.3)`,
            borderRadius: 6,
            padding: "6px 12px",
            fontSize: 11,
            cursor: "pointer",
            fontFamily: "'Outfit', sans-serif",
          }}
        >
          RESET
        </button>
      )}
    </div>
  );
}

function parseDuration(str) {
  if (!str) return 60;
  const match = str.match(/(\d+)/);
  return match ? parseInt(match[1]) : 60;
}

// Main App
function HotelWellnessPortal() {
  const [screen, setScreen] = useState("home");
  const [selectedSession, setSelectedSession] = useState(null);
  const [showIntro, setShowIntro] = useState(true);
  const scrollRef = useRef(null);
  const topRef = useRef(null);

  const scrollToTop = () => {
    setTimeout(() => {
      topRef.current?.scrollIntoView({ behavior: "auto", block: "start" });
    }, 10);
  };

  const navigate = (target, data) => {
    if (target === "session") {
      setSelectedSession(data);
      setScreen("session");
    } else if (target === "unlock") {
      setSelectedSession(data || null);
      setScreen("unlock");
    } else {
      setScreen(target);
    }
    scrollToTop();
  };

  const goHome = () => {
    setScreen("home");
    setSelectedSession(null);
    scrollToTop();
  };

  return (
    <div style={{
      width: "100%",
      maxWidth: 430,
      margin: "0 auto",
      minHeight: "100vh",
      background: HOTEL_CONFIG.dark,
      fontFamily: "'Outfit', sans-serif",
      position: "relative",
    }}>
      
      {/* Top accent line */}
      <div ref={topRef} style={{ width: "100%", height: 3, background: `linear-gradient(90deg, transparent, ${HOTEL_CONFIG.accent}, transparent)` }} />

      {/* Intro Video Modal */}
      {showIntro && <IntroModal onClose={() => setShowIntro(false)} />}

      <div ref={scrollRef} style={{ overflowY: "auto" }}>
        {screen === "home" && <HomeScreen onNavigate={navigate} />}
        {screen === "session" && selectedSession && <SessionScreen session={selectedSession} onBack={goHome} onNavigate={navigate} />}
        {screen === "unlock" && <UnlockScreen session={selectedSession} onBack={goHome} onNavigate={navigate} />}
        {screen === "equipment" && <EquipmentScreen onBack={goHome} />}
        {screen === "about" && <AboutScreen onBack={goHome} />}
        {screen === "premium" && <PremiumScreen onBack={goHome} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(HotelWellnessPortal));

  </script>
</body>
