async function addToMailerLite(email, hotelName, sessionsCompleted) {
  if (MAILERLITE.apiKey === "YOUR_MAILERLITE_API_KEY") return; // Skip if placeholder
  try {
    const groups = [MAILERLITE.groups.hotel];
    if (sessionsCompleted >= 3) groups.push(MAILERLITE.groups.completed);
    await fetch("https://connect.mailerlite.com/api/subscribers", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${MAILERLITE.apiKey}`,
      },
      body: JSON.stringify({
        email,
        groups,
        fields: { hotel: hotelName, sessions_completed: String(sessionsCompleted) },
      }),
    });
  } catch (e) { console.log("MailerLite sync skipped:", e.message); }
}

const db = {
  async getGuest(email) {
    if (!_sb) return null;
    try {
      const { data } = await _sb.from("guests").select("*")
        .eq("email", email).eq("hotel", HOTEL_CONFIG.name).single();
      return data;
    } catch { return null; }
  },
  async hasPremiumAnywhere(email) {
    if (!_sb) return null;
    try {
      const { data } = await _sb.from("guests").select("unlocked_sessions, premium_purchased")
        .eq("email", email);
      if (!data || data.length === 0) return null;
      let allUnlocked = [];
      let hasPaid = false;
      data.forEach(row => {
        if (row.premium_purchased) hasPaid = true;
        if (row.unlocked_sessions) allUnlocked = [...allUnlocked, ...row.unlocked_sessions];
      });
      allUnlocked = [...new Set(allUnlocked)];
      if (hasPaid || allUnlocked.length > 0) return { unlocked: allUnlocked, paid: hasPaid };
      return null;
    } catch { return null; }
  },
  async saveGuest(email, fields) {
    if (!_sb) return;
    try {
      await _sb.from("guests").upsert(
        { email, hotel: HOTEL_CONFIG.name, ...fields },
        { onConflict: "email,hotel" }
      );
    } catch {}
  },
};

// Timer component
function Timer({ duration, onComplete }) {
  const [timeLeft, setTimeLeft] = useState(duration);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running && timeLeft > 0) {
      intervalRef.current = setInterval(() => {
        setTimeLeft((t) => {
          if (t <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            onComplete?.();
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, timeLeft]);

  const reset = () => {
    clearInterval(intervalRef.current);
    setTimeLeft(duration);
    setRunning(false);
  };

  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 20, color: HOTEL_CONFIG.accent, minWidth: 60 }}>
        {mins}:{secs.toString().padStart(2, "0")}
      </span>
      <button
        onClick={() => setRunning(!running)}
        style={{
          background: running ? "rgba(123,45,62,0.12)" : HOTEL_CONFIG.accent,
          color: running ? HOTEL_CONFIG.accent : HOTEL_CONFIG.dark,
          border: "none",
          borderRadius: 6,
          padding: "6px 16px",
          fontSize: 12,
          fontWeight: 700,
          letterSpacing: 1,
          cursor: "pointer",
          fontFamily: "'Lato', sans-serif",
        }}
      >
        {running ? "PAUSE" : timeLeft < duration ? "RESUME" : "START"}
      </button>
      {timeLeft < duration && (
        <button
          onClick={reset}
          style={{
            background: "transparent",
            color: HOTEL_CONFIG.textSecondary,
            border: `1px solid rgba(138,154,176,0.3)`,
            borderRadius: 6,
            padding: "6px 12px",
            fontSize: 11,
            cursor: "pointer",
            fontFamily: "'Lato', sans-serif",
          }}
        >
          RESET
        </button>
      )}
    </div>
  );
}

function parseDuration(str) {
  if (!str) return 60;
  const match = str.match(/(\d+)/);
  return match ? parseInt(match[1]) : 60;
}

  const firstCircuit = session.circuits ? session.circuits[0] : null;
  const previewExercises = firstCircuit ? firstCircuit.exercises.slice(0, 3) : session.exercises ? session.exercises.slice(0, 3) : [];
  const totalExercises = session.circuits
    ? session.circuits.reduce((sum, c) => sum + c.exercises.length, 0)
    : (session.exercises ? session.exercises.length : 0);
  const remainingCount = totalExercises - previewExercises.length;

  return (

function CelebrationScreen({ session, onNavigate, onHome, completedFreeCount, capturedEmail, onSaveEmail, unlockedSessions, onUnlockSession }) {
  const [phase, setPhase] = useState(0);
  const [email, setEmail] = useState("");
  const [emailJustSubmitted, setEmailJustSubmitted] = useState(false);
  const [emailError, setEmailError] = useState(false);
  const [skipped, setSkipped] = useState(false);
  const [pickedSession, setPickedSession] = useState(null);
  const [expandedPicker, setExpandedPicker] = useState(null);
  useEffect(() => {
    setTimeout(() => setPhase(1), 100);
    setTimeout(() => setPhase(2), 800);
  }, []);

  const allFreeComplete = completedFreeCount >= FREE_COUNT;
  const nextFree = session.pairWith ? sessions.find(s => s.id === session.pairWith.id) : null;
  const isFreeSession = session.free;
  const showEmailCapture = !capturedEmail && !emailJustSubmitted && !skipped;
  const showPicker = emailJustSubmitted && !pickedSession;
  const lockedPremium = sessions.filter(s => !s.free && !unlockedSessions.includes(s.id));

  const handleEmailSubmit = async () => {
    const isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    if (!isValid) { setEmailError(true); setTimeout(() => setEmailError(false), 2000); return; }
    track('email_capture', { completed_sessions: completedFreeCount });
    const result = await onSaveEmail(email);
    setEmailJustSubmitted(true);
    if (result === "returning") { setPickedSession({ title: "your selections", id: "_returning" }); }
  };

  const getMessage = () => {
    if (completedFreeCount === 1 && isFreeSession) return "That's one down. You just did more for your body than most people do on vacation.";
    if (completedFreeCount === 2 && isFreeSession) return "Two sessions in. You're building momentum — your body is already thanking you.";
    if (allFreeComplete && isFreeSession) return "All three complimentary sessions — complete. You didn't just work out on vacation. You started something.";
    return "Another session in the books. Keep this momentum going.";
  };

  const getSubMessage = () => {
    if (allFreeComplete && isFreeSession) return "Ready to take this home with you?";
    if (nextFree && !nextFree.free) return "Your next chapter is waiting behind the premium unlock.";
    return session.pairWith ? session.pairWith.reason : "Check out another session whenever you're ready.";
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      padding: "40px 24px", textAlign: "center",
      background: HOTEL_CONFIG.dark, position: "relative", overflow: "hidden",
    }}>
      <div style={{
        position: "absolute", top: "30%", left: "50%", transform: "translate(-50%, -50%)",
        width: 400, height: 400, borderRadius: "50%",
        background: `radial-gradient(circle, ${HOTEL_CONFIG.accent}10, transparent 70%)`,
        opacity: phase >= 1 ? 1 : 0, transition: "opacity 1.2s ease",
      }} />

      <div style={{
        width: 88, height: 88, borderRadius: "50%",
        background: `${HOTEL_CONFIG.accent}10`, border: `2px solid ${HOTEL_CONFIG.accent}30`,
        display: "flex", alignItems: "center", justifyContent: "center",
        marginBottom: 28, position: "relative",
        transform: phase >= 1 ? "scale(1)" : "scale(0.5)",
        opacity: phase >= 1 ? 1 : 0,
        transition: "all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
      }}>
        <span style={{ fontSize: 40, color: HOTEL_CONFIG.accent }}>✓</span>
        <div style={{
          position: "absolute", inset: -8, borderRadius: "50%",
          border: `1px solid ${HOTEL_CONFIG.accent}25`,
          animation: phase >= 1 ? "celebration-pulse 2s ease-out infinite" : "none",
        }} />
      </div>

      <p style={{
        fontSize: 11, letterSpacing: 3, color: HOTEL_CONFIG.accent,
        fontWeight: 600, margin: "0 0 8px", fontFamily: "'Lato', sans-serif",
        opacity: phase >= 1 ? 1 : 0, transition: "opacity 0.4s ease 0.3s",
      }}>SESSION COMPLETE</p>

      <h2 style={{
        fontSize: 28, color: HOTEL_CONFIG.textPrimary, margin: "0 0 20px",
        fontWeight: 400, fontFamily: "'Playfair Display', serif",
        opacity: phase >= 1 ? 1 : 0, transition: "opacity 0.4s ease 0.4s",
      }}>{session.title}</h2>

      {isFreeSession && (
        <div style={{
          display: "flex", alignItems: "center", gap: 10, marginBottom: 28,
          opacity: phase >= 2 ? 1 : 0, transition: "opacity 0.5s ease 0.2s",
        }}>
          {FREE_SESSIONS.map((fs, i) => {
            const isDone = completedFreeCount > i || (completedFreeCount === i + 1 && fs.id === session.id);
            return (
              <div key={fs.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{
                  width: isDone ? 32 : 10, height: 10, borderRadius: 5,
                  background: isDone ? HOTEL_CONFIG.accent : `${HOTEL_CONFIG.accent}20`,
                  transition: "all 0.5s ease",
                  boxShadow: fs.id === session.id ? `0 0 12px ${HOTEL_CONFIG.accent}30` : "none",
                }} />
                {i < FREE_SESSIONS.length - 1 && <div style={{ width: 20, height: 1, background: `${HOTEL_CONFIG.accent}15` }} />}
              </div>
            );
          })}
        </div>
      )}

      {isFreeSession && (
        <p style={{
          fontSize: 12, color: HOTEL_CONFIG.textSecondary, margin: "0 0 24px",
          fontFamily: "'Lato', sans-serif", letterSpacing: 1,
          opacity: phase >= 2 ? 1 : 0, transition: "opacity 0.5s ease 0.3s",
        }}>{completedFreeCount} of {FREE_COUNT} COMPLIMENTARY SESSIONS</p>
      )}

      <p style={{
        fontSize: 16, color: HOTEL_CONFIG.textPrimary, margin: "0 0 10px",
        lineHeight: 1.6, maxWidth: 320, fontFamily: "'Lato', sans-serif",
        opacity: phase >= 2 ? 1 : 0, transition: "opacity 0.5s ease 0.4s",
      }}>{getMessage()}</p>

      <p style={{
        fontSize: 14, color: HOTEL_CONFIG.textSecondary, margin: "0 0 32px",
        lineHeight: 1.6, maxWidth: 300, fontFamily: "'Lato', sans-serif",
        opacity: phase >= 2 ? 1 : 0, transition: "opacity 0.5s ease 0.5s",
      }}>{getSubMessage()}</p>

      <div style={{
        width: "100%", maxWidth: 320,
        opacity: phase >= 2 ? 1 : 0, transform: phase >= 2 ? "translateY(0)" : "translateY(12px)",
        transition: "all 0.5s ease 0.6s",
      }}>
        {/* Email Capture — shows on every completion until captured */}
        {showEmailCapture && (
          <div style={{
            background: HOTEL_CONFIG.cardBg, border: `1px solid ${HOTEL_CONFIG.cardBorder}`,
            borderRadius: 14, padding: "20px 18px", marginBottom: 16, textAlign: "center",
          }}>
            <p style={{ fontSize: 11, letterSpacing: 2, color: HOTEL_CONFIG.accent, fontWeight: 600, margin: "0 0 8px", fontFamily: "'Lato', sans-serif" }}>
              SAVE YOUR PROGRESS
            </p>
            <p style={{ fontSize: 13, color: HOTEL_CONFIG.textSecondary, margin: "0 0 16px", lineHeight: 1.5, fontFamily: "'Lato', sans-serif" }}>
              Enter your email to save your progress and unlock a <span style={{ color: HOTEL_CONFIG.accent, fontWeight: 600 }}>free premium session</span> as a thank you.
            </p>
            <div style={{ display: "flex", gap: 8 }}>
              <input
                type="email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && handleEmailSubmit()}
                placeholder="your@email.com"
                style={{
                  flex: 1, padding: "14px 16px",
                  background: "#f5f2ed", color: HOTEL_CONFIG.textPrimary,
                  border: `1px solid ${emailError ? '#e53e3e' : HOTEL_CONFIG.cardBorder}`,
                  borderRadius: 10, fontSize: 14, fontFamily: "'Lato', sans-serif",
                  outline: "none", transition: "border-color 0.2s",
                }}
                onFocus={(e) => e.target.style.borderColor = HOTEL_CONFIG.accent}
                onBlur={(e) => e.target.style.borderColor = emailError ? '#e53e3e' : HOTEL_CONFIG.cardBorder}
              />
              <button onClick={handleEmailSubmit} style={{
                padding: "14px 18px", border: "none",
                background: HOTEL_CONFIG.accent, color: "#fff",
                borderRadius: 10, fontSize: 16, cursor: "pointer",
                fontWeight: 700, flexShrink: 0,
              }}>→</button>
            </div>
            {emailError && (
              <p style={{ fontSize: 12, color: "#e53e3e", margin: "8px 0 0", fontFamily: "'Lato', sans-serif" }}>
                Please enter a valid email address.
              </p>
            )}
            <p
              onClick={() => setSkipped(true)}
              style={{
                fontSize: 12, color: `${HOTEL_CONFIG.textSecondary}90`, margin: "14px 0 0",
                cursor: "pointer", fontFamily: "'Lato', sans-serif", transition: "color 0.2s",
              }}
              onMouseEnter={(e) => e.target.style.color = HOTEL_CONFIG.textPrimary}
              onMouseLeave={(e) => e.target.style.color = `${HOTEL_CONFIG.textSecondary}90`}
            >Skip for now</p>
          </div>
        )}

        {/* Session Picker — choose your free premium session */}
        {showPicker && lockedPremium.length > 0 && (
          <div style={{
            background: HOTEL_CONFIG.cardBg, border: `1px solid ${HOTEL_CONFIG.cardBorder}`,
            borderRadius: 14, padding: "18px 16px", marginBottom: 16, textAlign: "center",
          }}>
            <p style={{ fontSize: 11, letterSpacing: 2, color: HOTEL_CONFIG.accent, fontWeight: 600, margin: "0 0 6px", fontFamily: "'Lato', sans-serif" }}>
              CHOOSE YOUR FREE SESSION
            </p>
            <p style={{ fontSize: 12, color: HOTEL_CONFIG.textSecondary, margin: "0 0 14px", fontFamily: "'Lato', sans-serif" }}>
              Tap to learn more, then unlock.
            </p>
            {lockedPremium.map((s) => {
              const isExpanded = expandedPicker === s.id;
              return (
                <div key={s.id} style={{
                  background: "#f5f2ed",
                  border: `1px solid ${isExpanded ? s.color : s.color + '25'}`,
                  borderRadius: 10, marginBottom: 8, overflow: "hidden",
                  transition: "border-color 0.2s",
                }}>
                  <button
                    onClick={() => setExpandedPicker(isExpanded ? null : s.id)}
                    style={{
                      display: "flex", alignItems: "center", width: "100%",
                      background: "transparent", border: "none",
                      padding: "14px 12px", cursor: "pointer", textAlign: "left",
                    }}
                  >
                    <div style={{
                      width: 40, height: 40, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 18, background: `${s.color}12`, marginRight: 12, flexShrink: 0,
                    }}>{s.icon}</div>
                    <div style={{ flex: 1 }}>
                      <p style={{ color: HOTEL_CONFIG.textPrimary, fontSize: 14, margin: 0, fontWeight: 500, fontFamily: "'Playfair Display', serif" }}>{s.title}</p>
                      <span style={{ fontSize: 10, color: s.color, fontFamily: "'Lato', sans-serif" }}>⏱ {s.duration} · ◈ {s.intensity}</span>
                    </div>
                    <span style={{
                      color: HOTEL_CONFIG.textSecondary, fontSize: 16,
                      transform: isExpanded ? "rotate(90deg)" : "rotate(0deg)",
                      transition: "transform 0.2s", flexShrink: 0,
                    }}>›</span>
                  </button>
                  {isExpanded && (
                    <div style={{ padding: "0 14px 14px" }}>
                      <p style={{ color: HOTEL_CONFIG.textSecondary, fontSize: 12, margin: "0 0 12px", lineHeight: 1.5, fontFamily: "'Lato', sans-serif", textAlign: "left" }}>
                        {s.description}
                      </p>
                      {s.format && (
                        <p style={{ color: s.color, fontSize: 10, margin: "0 0 12px", fontFamily: "'Lato', sans-serif", textAlign: "left", letterSpacing: 1 }}>
                          {s.format}
                        </p>
                      )}
                      <button
                        onClick={() => { onUnlockSession(s.id); setPickedSession(s); }}
                        style={{
                          width: "100%", padding: "12px", border: "none",
                          background: `linear-gradient(135deg, ${HOTEL_CONFIG.accent}, ${HOTEL_CONFIG.accentLight || HOTEL_CONFIG.accent})`,
                          color: "#fff", borderRadius: 8,
                          fontSize: 12, fontWeight: 700, letterSpacing: 2,
                          cursor: "pointer", fontFamily: "'Lato', sans-serif",
                        }}
                      >UNLOCK THIS SESSION — FREE</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Picked session confirmation */}
        {pickedSession && (
          <div style={{
            background: `${HOTEL_CONFIG.accent}08`, border: `1px solid ${HOTEL_CONFIG.accent}18`,
            borderRadius: 12, padding: "14px 16px", marginBottom: 16, textAlign: "center",
          }}>
            {pickedSession.id === "_returning" ? (
              <p style={{ fontSize: 13, color: HOTEL_CONFIG.accent, margin: 0, fontFamily: "'Lato', sans-serif", fontWeight: 600 }}>
                ✓ Welcome back — your premium sessions are restored!
              </p>
            ) : (
              <>
                <p style={{ fontSize: 13, color: HOTEL_CONFIG.accent, margin: "0 0 4px", fontFamily: "'Lato', sans-serif", fontWeight: 600 }}>
                  ✓ {pickedSession.title} is now unlocked!
                </p>
                <p
                  onClick={() => onNavigate("session", pickedSession)}
                  style={{ fontSize: 12, color: HOTEL_CONFIG.accent, margin: 0, fontFamily: "'Lato', sans-serif", cursor: "pointer", textDecoration: "underline", opacity: 0.8 }}
                >Start it now →</p>
              </>
            )}
          </div>
        )}

        {/* Already captured email on a previous session */}
        {capturedEmail && !emailJustSubmitted && !pickedSession && (
          <div style={{
            background: `${HOTEL_CONFIG.accent}06`, border: `1px solid ${HOTEL_CONFIG.accent}12`,
            borderRadius: 12, padding: "12px 16px", marginBottom: 16, textAlign: "center",
          }}>
            <p style={{ fontSize: 12, color: HOTEL_CONFIG.accent, margin: 0, fontFamily: "'Lato', sans-serif", opacity: 0.8 }}>
              ✓ Progress saved to {capturedEmail}
            </p>
          </div>
        )}

        {allFreeComplete && isFreeSession ? (
          <>
            <button onClick={() => onNavigate("premium")} style={{
              width: "100%", padding: "16px", border: "none",
              background: `linear-gradient(135deg, ${HOTEL_CONFIG.accent}, ${HOTEL_CONFIG.accentLight || HOTEL_CONFIG.accent})`,
              color: "#fff", borderRadius: 12,
              fontSize: 13, fontWeight: 700, letterSpacing: 2,
              cursor: "pointer", fontFamily: "'Lato', sans-serif",
              marginBottom: 12, boxShadow: `0 4px 20px ${HOTEL_CONFIG.accent}25`,
            }}>EXPLORE PREMIUM PROGRAMS</button>
            <button onClick={() => { track('schedule_click', { type: 'consultation', source: 'celebration' }); window.open(CAL_LINKS.consultation, '_blank'); }} style={{
              width: "100%", padding: "14px", border: `1px solid ${HOTEL_CONFIG.accent}40`,
              background: "transparent", color: HOTEL_CONFIG.accent,
              borderRadius: 12, fontSize: 12, fontWeight: 600, letterSpacing: 1,
              cursor: "pointer", fontFamily: "'Lato', sans-serif",
              marginBottom: 12,
            }}>WANT SOMETHING CUSTOM? BOOK A FREE CALL</button>
            <button onClick={onHome} style={{
              width: "100%", padding: "14px", border: `1px solid ${HOTEL_CONFIG.cardBorder}`,
              background: "transparent", color: HOTEL_CONFIG.textSecondary,
              borderRadius: 12, fontSize: 13, fontWeight: 500,
              cursor: "pointer", fontFamily: "'Lato', sans-serif",
            }}>Back to Home</button>
          </>
        ) : (
          <>
            {nextFree && nextFree.free && (
              <button onClick={() => onNavigate("session", nextFree)} style={{
                width: "100%", padding: "16px", border: "none",
                background: `linear-gradient(135deg, ${HOTEL_CONFIG.accent}, ${HOTEL_CONFIG.accentLight || HOTEL_CONFIG.accent})`,
                color: "#fff", borderRadius: 12,
                fontSize: 13, fontWeight: 700, letterSpacing: 2,
                cursor: "pointer", fontFamily: "'Lato', sans-serif",
                marginBottom: 12, boxShadow: `0 4px 20px ${HOTEL_CONFIG.accent}25`,
              }}>NEXT: {nextFree.title.toUpperCase()}</button>
            )}
            <button onClick={onHome} style={{
              width: "100%", padding: "14px", border: `1px solid ${HOTEL_CONFIG.cardBorder}`,
              background: "transparent", color: HOTEL_CONFIG.textSecondary,
              borderRadius: 12, fontSize: 13, fontWeight: 500,
              cursor: "pointer", fontFamily: "'Lato', sans-serif",
            }}>Back to Home</button>
          </>
        )}
      </div>

      <style>{`
        @keyframes celebration-pulse {
          0% { transform: scale(1); opacity: 0.5; }
          100% { transform: scale(1.8); opacity: 0; }
        }
      `}</style>
    </div>
  );
}

function HotelWellnessPortal() {
  const _isPaymentReturn = new URLSearchParams(window.location.search).get("payment") === "success";
  const [screen, setScreen] = useState(_isPaymentReturn ? "purchase-success" : "home");
  const [selectedSession, setSelectedSession] = useState(null);
  const [showIntro, setShowIntro] = useState(!_isPaymentReturn);
  const [completedSessions, setCompletedSessions] = useState(() => {
    try { const s = localStorage.getItem("sh_fqi_completed"); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [capturedEmail, setCapturedEmail] = useState(() => {
    try { return localStorage.getItem("sh_fqi_email") || ""; } catch { return ""; }
  });
  const [unlockedSessions, setUnlockedSessions] = useState(() => {
    try { const s = localStorage.getItem("sh_fqi_unlocked"); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const scrollRef = useRef(null);

  useEffect(() => {
    try { localStorage.setItem("sh_fqi_completed", JSON.stringify(completedSessions)); } catch {}
  }, [completedSessions]);

  useEffect(() => {
    if (capturedEmail) { try { localStorage.setItem("sh_fqi_email", capturedEmail); } catch {} }
  }, [capturedEmail]);

  useEffect(() => {
    try { localStorage.setItem("sh_fqi_unlocked", JSON.stringify(unlockedSessions)); } catch {}
  }, [unlockedSessions]);

  // Handle Stripe payment success redirect
  useEffect(() => {
    if (_isPaymentReturn) {
      const allPremiumIds = sessions.filter(s => !s.free).map(s => s.id);
      setUnlockedSessions(allPremiumIds);
      localStorage.setItem("sh_fqi_unlocked", JSON.stringify(allPremiumIds));
      const email = localStorage.getItem("sh_fqi_email") || "";
      if (email) {
        db.saveGuest(email, { unlocked_sessions: allPremiumIds, premium_purchased: true });
      }
      window.history.replaceState({}, "", window.location.pathname);
    }
  }, []);

  const saveEmail = async (email) => {
    setCapturedEmail(email);
    try {
      const stored = JSON.parse(localStorage.getItem("sh_emails") || "[]");
      stored.push({ email, hotel: HOTEL_CONFIG.name, sessions: completedSessions.length, date: new Date().toISOString() });
      localStorage.setItem("sh_emails", JSON.stringify(stored));
    } catch {}
    // Send to MailerLite
    addToMailerLite(email, HOTEL_CONFIG.name, completedSessions.length);
    // Check Supabase for existing guest at THIS hotel
    const existing = await db.getGuest(email);
    if (existing) {
      if (existing.premium_purchased) {
        const allPremiumIds = sessions.filter(s => !s.free).map(s => s.id);
        setUnlockedSessions(allPremiumIds);
        localStorage.setItem("sh_fqi_unlocked", JSON.stringify(allPremiumIds));
      } else if (existing.unlocked_sessions && existing.unlocked_sessions.length > 0) {
        setUnlockedSessions(existing.unlocked_sessions);
        localStorage.setItem("sh_fqi_unlocked", JSON.stringify(existing.unlocked_sessions));
      }
      if (existing.unlocked_sessions && existing.unlocked_sessions.length > 0) {
        return "returning";
      }
    } else {
      // New to this hotel — check if they have unlocks at ANY other hotel
      const crossHotel = await db.hasPremiumAnywhere(email);
      if (crossHotel) {
        if (crossHotel.paid) {
          const allPremiumIds = sessions.filter(s => !s.free).map(s => s.id);
          setUnlockedSessions(allPremiumIds);
          localStorage.setItem("sh_fqi_unlocked", JSON.stringify(allPremiumIds));
          await db.saveGuest(email, { unlocked_sessions: allPremiumIds, premium_purchased: true });
        } else {
          setUnlockedSessions(crossHotel.unlocked);
          localStorage.setItem("sh_fqi_unlocked", JSON.stringify(crossHotel.unlocked));
          await db.saveGuest(email, { unlocked_sessions: crossHotel.unlocked });
        }
        return "returning";
      }
      await db.saveGuest(email, {});
    }
    // If all premium sessions are already unlocked locally (purchased before email entry), sync to Supabase
    const allPremiumIds = sessions.filter(s => !s.free).map(s => s.id);
    const currentUnlocked = JSON.parse(localStorage.getItem("sh_fqi_unlocked") || "[]");
    if (allPremiumIds.length > 0 && allPremiumIds.every(id => currentUnlocked.includes(id))) {
      await db.saveGuest(email, { unlocked_sessions: allPremiumIds, premium_purchased: true });
    }
    return "new";
  };

  const unlockSession = (sessionId) => {
    const updated = unlockedSessions.includes(sessionId) ? unlockedSessions : [...unlockedSessions, sessionId];
    setUnlockedSessions(updated);
    localStorage.setItem("sh_fqi_unlocked", JSON.stringify(updated));
    if (capturedEmail) db.saveGuest(capturedEmail, { unlocked_sessions: updated });
  };

  const unlockAllSessions = () => {
    const allPremiumIds = sessions.filter(s => !s.free).map(s => s.id);
    setUnlockedSessions(allPremiumIds);
    localStorage.setItem("sh_fqi_unlocked", JSON.stringify(allPremiumIds));
    if (capturedEmail) db.saveGuest(capturedEmail, { unlocked_sessions: allPremiumIds, premium_purchased: true });
  };

  const loginGuest = async (email) => {
    // Check this hotel first
    const existing = await db.getGuest(email);
    if (existing) {
      setCapturedEmail(email);
      localStorage.setItem("sh_fqi_email", email);
      if (existing.premium_purchased) {
        const allPremiumIds = sessions.filter(s => !s.free).map(s => s.id);
        setUnlockedSessions(allPremiumIds);
        localStorage.setItem("sh_fqi_unlocked", JSON.stringify(allPremiumIds));
      } else if (existing.unlocked_sessions && existing.unlocked_sessions.length > 0) {
        setUnlockedSessions(existing.unlocked_sessions);
        localStorage.setItem("sh_fqi_unlocked", JSON.stringify(existing.unlocked_sessions));
      }
      return "found";
    }
    // Check other hotels
    const crossHotel = await db.hasPremiumAnywhere(email);
    if (crossHotel) {
      setCapturedEmail(email);
      localStorage.setItem("sh_fqi_email", email);
      if (crossHotel.paid) {
        const allPremiumIds = sessions.filter(s => !s.free).map(s => s.id);
        setUnlockedSessions(allPremiumIds);
        localStorage.setItem("sh_fqi_unlocked", JSON.stringify(allPremiumIds));
        await db.saveGuest(email, { unlocked_sessions: allPremiumIds, premium_purchased: true });
      } else {
        setUnlockedSessions(crossHotel.unlocked);
        localStorage.setItem("sh_fqi_unlocked", JSON.stringify(crossHotel.unlocked));
        await db.saveGuest(email, { unlocked_sessions: crossHotel.unlocked });
      }
      return "found";
    }
    return "not_found";
  };

  const completedFreeCount = completedSessions.filter(id => FREE_SESSIONS.some(s => s.id === id)).length;

  const completeSession = (sessionId) => {
    if (!completedSessions.includes(sessionId)) {
      setCompletedSessions(prev => [...prev, sessionId]);
    }
    track('session_complete', { session_id: sessionId });
    setNavKey(k => k + 1);
    setScreen("celebration");
  };

  const [navKey, setNavKey] = useState(0);
  const topRef = useRef(null);

  useEffect(() => {
    const scrollToTop = () => {
      if (topRef.current) topRef.current.scrollIntoView({ behavior: "auto", block: "start" });
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      if (scrollRef.current) scrollRef.current.scrollTop = 0;
      const root = document.getElementById('root');
      if (root) root.scrollTop = 0;
      if (root && root.parentElement) root.parentElement.scrollTop = 0;
    };
    scrollToTop();
    requestAnimationFrame(scrollToTop);
    setTimeout(scrollToTop, 50);
  }, [screen, navKey]);

  const navigate = (target, data) => {
    if (target === "session") {
      setSelectedSession(data);
      setScreen("session");
      track('screen_view', { screen: 'session', session_title: data?.title });
    } else if (target === "preview") {
      setSelectedSession(data);
      setScreen("preview");
      track('screen_view', { screen: 'preview', session_title: data?.title });
    } else if (target === "unlock") {
      setSelectedSession(data || null);
      setScreen("unlock");
      track('screen_view', { screen: 'unlock' });
    } else {
      setScreen(target);
      track('screen_view', { screen: target });
    }
    setNavKey(k => k + 1);
  };

  const goHome = () => {
    setScreen("home");
    setSelectedSession(null);
    track('screen_view', { screen: 'home' });
    setNavKey(k => k + 1);
  };

  return (
    <div style={{
      width: "100%",
      maxWidth: 430,
      margin: "0 auto",
      minHeight: "100vh",
      background: HOTEL_CONFIG.dark,
      fontFamily: "'Lato', sans-serif",
      position: "relative",
    }}>
      {/* Scroll anchor */}
      <div ref={topRef} style={{ height: 0, overflow: "hidden" }} />
      
      {/* Top accent line */}
      <div style={{ width: "100%", height: 3, background: `linear-gradient(90deg, transparent, ${HOTEL_CONFIG.accent}, transparent)` }} />

      {/* Intro Video Modal */}
      {showIntro && <IntroModal onClose={() => setShowIntro(false)} />}

      <div ref={scrollRef} key={navKey} style={{ overflowY: "auto" }}>
        {screen === "home" && <HomeScreen onNavigate={navigate} completedSessions={completedSessions} completedFreeCount={completedFreeCount} unlockedSessions={unlockedSessions} capturedEmail={capturedEmail} onLogin={loginGuest} />}
        {screen === "session" && selectedSession && <SessionScreen session={selectedSession} onBack={goHome} onNavigate={navigate} onComplete={completeSession} isCompleted={completedSessions.includes(selectedSession.id)} />}
        {screen === "celebration" && selectedSession && <CelebrationScreen session={selectedSession} onNavigate={navigate} onHome={goHome} completedFreeCount={completedFreeCount} capturedEmail={capturedEmail} onSaveEmail={saveEmail} unlockedSessions={unlockedSessions} onUnlockSession={unlockSession} />}
        {screen === "preview" && selectedSession && <PreviewScreen session={selectedSession} onBack={goHome} onNavigate={navigate} />}
        {screen === "unlock" && <UnlockScreen session={selectedSession} onBack={goHome} onNavigate={navigate} onUnlockAll={unlockAllSessions} capturedEmail={capturedEmail} />}
        {screen === "purchase-success" && <PurchaseSuccessScreen onNavigate={navigate} onHome={goHome} />}
        {screen === "equipment" && <EquipmentScreen onBack={goHome} />}
        {screen === "about" && <AboutScreen onBack={goHome} />}
        {screen === "premium" && <PremiumScreen onBack={goHome} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(HotelWellnessPortal));

  </script>
</body>
</html>
