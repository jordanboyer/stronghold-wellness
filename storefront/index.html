// Format: "CODE": { programs: [...program IDs...] }

// Hotel codes — share with hotel partners

  "SPECTATOR2026":   { programs: "all", label: "The Spectator Hotel" },
  "FQI2026":         { programs: "all", label: "French Quarter Inn" },

  fma: "https://cal.com/stronghold-fitness/fma",
  tpiGolf: "https://cal.com/stronghold-fitness/tpi",
};

// Analytics tracking helper
const track = (eventName, params = {}) => {
  if (typeof gtag === 'function') {
    gtag('event', eventName, { source: 'storefront', ...params });
  }
};

function validateCode(code, programId) {
  const entry = ACCESS_CODES[code.toUpperCase().trim()];
  if (!entry) return { valid: false };
  if (entry.programs === "all" || entry.programs.includes(programId)) {
    return { valid: true, programs: entry.programs, label: entry.label };
  }
  return { valid: false, wrongProgram: true, label: entry.label };
}

function useInView(t = 0.12) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); obs.disconnect(); } }, { threshold: t });
    obs.observe(el);
    return () => obs.disconnect();
  }, [t]);
  return [ref, v];
}

function FadeIn({ children, delay = 0, style = {} }) {
  const [ref, v] = useInView();
  return <div ref={ref} style={{ ...style, opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(20px)", transition: `all 0.65s ease ${delay}s` }}>{children}</div>;
}

                <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.12em", color: C.textLight, fontWeight: 700, marginBottom: 8 }}>At a Glance</div>
                {[[program.duration, "Duration"], [program.sessions, "Total Sessions"], [w.estTime, "Per Session"], [program.level, "Level"]].map(([v, l], i) => (
                  <div key={i} style={{ marginBottom: 6 }}>
                    <div style={{ fontSize: 14, color: C.text, fontWeight: 600 }}>{v}</div>
                    <div style={{ fontSize: 11, color: C.textLight }}>{l}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* CTA */}
        <div style={{ ...fadeIn(5), padding: "40px 0 60px", textAlign: "center" }}>
          <button onClick={onBegin} style={{ width: "100%", maxWidth: 360, padding: "16px 24px", background: program.accent, border: "none", borderRadius: 10, color: C.white, fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: "'Encode Sans Condensed', sans-serif", letterSpacing: "0.02em", boxShadow: `0 4px 20px ${program.accent}33`, transition: "all 0.3s" }}>
            Begin Session 1 →
          </button>
          <div style={{ marginTop: 12, fontSize: 12, color: C.textLight }}>{w.firstSession}</div>
        </div>
      </div>
    </div>
  );
}

function Timer({ initialSeconds, accent, autoStart }) {
  const [seconds, setSeconds] = useState(initialSeconds);
  const [running, setRunning] = useState(false);
  const [finished, setFinished] = useState(false);
  const intervalRef = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    if (autoStart && !started.current) { started.current = true; setRunning(true); }
  }, [autoStart]);
  useEffect(() => {
    if (running && seconds > 0) {
      intervalRef.current = setInterval(() => setSeconds(s => { if (s <= 1) { clearInterval(intervalRef.current); setRunning(false); setFinished(true); return 0; } return s - 1; }), 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, seconds]);
  const reset = () => { clearInterval(intervalRef.current); setSeconds(initialSeconds); setRunning(false); setFinished(false); started.current = false; };
  const mins = Math.floor(seconds / 60), secs = seconds % 60, pct = ((initialSeconds - seconds) / initialSeconds) * 100;
  const ac = accent || C.purple;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ position: "relative", width: 40, height: 40 }}>
        <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="17" fill="none" stroke={C.borderLight} strokeWidth="3" /><circle cx="20" cy="20" r="17" fill="none" stroke={finished ? C.success : ac} strokeWidth="3" strokeDasharray={`${2*Math.PI*17}`} strokeDashoffset={`${2*Math.PI*17*(1-pct/100)}`} transform="rotate(-90 20 20)" strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.3s" }} /></svg>
        <span style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: finished ? C.success : ac }}>{mins}:{secs.toString().padStart(2, "0")}</span>
      </div>
      {!running && !finished && <button onClick={() => setRunning(true)} style={{ background: ac + "12", border: `1px solid ${ac}33`, color: ac, padding: "4px 12px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'Encode Sans Semi Condensed'" }}>{seconds < initialSeconds ? "Resume" : "Start"}</button>}
      {running && <button onClick={() => { clearInterval(intervalRef.current); setRunning(false); }} style={{ background: ac + "12", border: `1px solid ${ac}33`, color: ac, padding: "4px 12px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'Encode Sans Semi Condensed'" }}>Pause</button>}
      {finished && <span style={{ fontSize: 11, color: C.success, fontWeight: 600 }}>✓ Rest complete</span>}
      {(finished || (!running && seconds < initialSeconds)) && <button onClick={reset} style={{ background: "transparent", border: `1px solid ${C.border}`, color: C.textMuted, padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'Encode Sans Semi Condensed'" }}>Reset</button>}
    </div>
  );
}

function ExerciseCard({ exercise, accent, setsCompleted, onCompleteSet, weight, onWeightChange }) {
  const [expanded, setExpanded] = useState(false);
  const [showRest, setShowRest] = useState(false);
  const [restKey, setRestKey] = useState(0);
  const totalSets = exercise.sets;
  const done = setsCompleted >= totalSets;

  const handleCompleteSet = () => {
    onCompleteSet();
    if (setsCompleted + 1 < totalSets && exercise.rest > 0) {
      setShowRest(true);
      setRestKey(k => k + 1);
    } else if (setsCompleted + 1 >= totalSets) {
      setShowRest(false);
    }
  };

  return (
    <div style={{ background: done ? "rgba(22,163,106,0.04)" : C.bgAlt, border: `1px solid ${done ? "rgba(22,163,106,0.25)" : C.border}`, borderRadius: 12, padding: "16px 18px", marginBottom: 12, transition: "all 0.25s" }}>
      {/* Header: name + prescription */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div style={{ flex: 1 }}>
          <span style={{ color: done ? C.textMuted : C.text, fontSize: 16, fontWeight: 700, fontFamily: "'Encode Sans Condensed', sans-serif", opacity: done ? 0.5 : 1, textDecoration: done ? "line-through" : "none" }}>{exercise.name}</span>
        </div>
        <span style={{ color: accent, fontSize: 13, fontWeight: 700, whiteSpace: "nowrap", marginLeft: 12, marginTop: 2 }}>{totalSets}×{exercise.reps}</span>
      </div>

      {/* Video demo — compact, always visible, loops when real video exists */}
      {(exercise.videoUrl || exercise.videoPlaceholder) && !done && (
        <div style={{ marginBottom: 10 }}>
          {exercise.videoUrl ? (
            /* Real video — looping, muted, inline */
            <div onClick={() => setExpanded(!expanded)} style={{ cursor: "pointer", borderRadius: 8, overflow: "hidden", background: "#000", position: "relative", height: expanded ? "auto" : 120 }}>
              <video src={exercise.videoUrl} autoPlay loop muted playsInline style={{ width: "100%", height: expanded ? "auto" : 120, objectFit: "cover", display: "block" }} />
              {!expanded && <div style={{ position: "absolute", bottom: 6, right: 8, background: "rgba(0,0,0,0.5)", borderRadius: 4, padding: "2px 8px", fontSize: 10, color: "rgba(255,255,255,0.8)", fontWeight: 600 }}>Tap to expand</div>}
            </div>
          ) : (
            /* Placeholder — compact strip ready for video */
            <div style={{ background: `linear-gradient(135deg, ${accent}08, ${accent}14)`, border: `1px solid ${accent}18`, borderRadius: 8, padding: "14px 16px", display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 44, height: 44, borderRadius: 8, background: accent + "15", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <span style={{ fontSize: 18, color: accent, marginLeft: 2 }}>▶</span>
              </div>
              <div>
                <span style={{ fontSize: 12, color: accent, fontWeight: 600 }}>Video Demo</span>
                <span style={{ fontSize: 11, color: C.textLight, display: "block", marginTop: 1 }}>Looping demo coming soon</span>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Coaching cue — ALWAYS VISIBLE */}
      <p style={{ color: C.textMuted, fontSize: 13, lineHeight: 1.6, margin: "0 0 14px", fontStyle: "italic", opacity: done ? 0.4 : 0.85 }}>"{exercise.cue}"</p>

      {/* Set counter + weight + rest */}
      {!done ? (
        <div>
          {/* Set dots + complete button */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
            <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
              {Array.from({ length: totalSets }).map((_, i) => (
                <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < setsCompleted ? C.success : i === setsCompleted ? accent : C.borderLight, border: i === setsCompleted ? `2px solid ${accent}` : "none", transition: "all 0.2s" }} />
              ))}
              <span style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginLeft: 4 }}>Set {setsCompleted + 1} of {totalSets}</span>
            </div>
            <button onClick={handleCompleteSet} style={{ marginLeft: "auto", padding: "6px 16px", background: accent, border: "none", borderRadius: 7, color: C.white, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'Encode Sans Semi Condensed', sans-serif", transition: "all 0.15s" }}>
              {setsCompleted + 1 >= totalSets ? "Final Set ✓" : "Complete Set →"}
            </button>
          </div>

          {/* Weight input */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: showRest ? 12 : 0 }}>
            <span style={{ fontSize: 11, color: C.textLight, fontWeight: 600 }}>Weight:</span>
            <input value={weight} onChange={e => onWeightChange(e.target.value)} placeholder="e.g. 35 lb" style={{ width: 90, padding: "5px 8px", background: C.white, border: `1px solid ${C.border}`, borderRadius: 6, fontSize: 12, color: C.text, outline: "none", fontFamily: "'Encode Sans Semi Condensed', sans-serif" }} />
            {exercise.rest > 0 && !showRest && (
              <button onClick={() => { setShowRest(true); setRestKey(k => k + 1); }} style={{ marginLeft: "auto", padding: "5px 12px", background: accent + "10", border: `1px solid ${accent}28`, borderRadius: 6, color: accent, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "'Encode Sans Semi Condensed', sans-serif" }}>
                Rest {exercise.rest}s
              </button>
            )}
          </div>

          {/* Rest timer — surfaces after completing a set */}
          {showRest && exercise.rest > 0 && (
            <div style={{ background: C.white, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <Timer key={restKey} initialSeconds={exercise.rest} accent={accent} autoStart={true} />
              <button onClick={() => setShowRest(false)} style={{ background: "none", border: "none", color: C.textLight, fontSize: 16, cursor: "pointer", padding: "0 4px" }}>×</button>
            </div>
          )}
        </div>
      ) : (
        /* Completed state */
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ color: C.success, fontSize: 12, fontWeight: 700 }}>✓ All {totalSets} sets complete</span>
          {weight && <span style={{ color: C.textLight, fontSize: 11, marginLeft: 4 }}>· {weight}</span>}
        </div>
      )}
    </div>
  );
}

function estimateSessionTime(session) {
  let secs = 0;
  const warmupMins = parseInt(session.warmup.duration) || 5;
  secs += warmupMins * 60;
  session.blocks.forEach(b => b.exercises.forEach(ex => {
    secs += ex.sets * 40;
    secs += (ex.sets - 1) * (ex.rest || 0);
  }));
  const mins = Math.round(secs / 60);
  if (mins < 20) return "~" + Math.ceil(mins / 5) * 5 + " min";
  return "~" + Math.round(mins / 5) * 5 + " min";
}

function getCompleteMsg(programId, weekNum, totalWeeks) {
  const msgs = COMPLETE_MSGS[programId] || COMPLETE_MSGS["stronghold-method"];
  const phase = weekNum <= Math.ceil(totalWeeks * 0.4) ? "early" : weekNum <= Math.ceil(totalWeeks * 0.75) ? "mid" : "late";
  const pool = msgs[phase] || msgs.early;
  return pool[Math.floor(Math.random() * pool.length)];
}

function getNextSession(data, currentSessionId) {
  const allSessions = [];
  data.weeks.forEach((w, wi) => w.sessions.forEach((s, si) => allSessions.push({ ...s, weekIndex: wi, weekNum: w.weekNum, weekTitle: w.title })));
  const idx = allSessions.findIndex(s => s.id === currentSessionId);
  if (idx >= 0 && idx < allSessions.length - 1) return allSessions[idx + 1];
  return null;
}

function WorkoutViewer({ programId, program, accent, onBack, onViewProgram }) {
  const [view, setView] = useState("program");
  const [activeWeek, setActiveWeek] = useState(0);
  const [activeSession, setActiveSession] = useState(null);
  const [completedSets, setCompletedSets] = useState({});
  const [completedWarmup, setCompletedWarmup] = useState({});
  const [weights, setWeights] = useState({});
  const [completedSess, setCompletedSess] = useState({});
  const [completePhase, setCompletePhase] = useState(0);
  const data = WORKOUT_DATA[programId];

  // Staggered animation for completion screen
  useEffect(() => {
    if (view !== "complete") { setCompletePhase(0); return; }
    const t1 = setTimeout(() => setCompletePhase(1), 100);
    const t2 = setTimeout(() => setCompletePhase(2), 500);
    const t3 = setTimeout(() => setCompletePhase(3), 900);
    const t4 = setTimeout(() => setCompletePhase(4), 1300);
    const t5 = setTimeout(() => setCompletePhase(5), 1700);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); clearTimeout(t5); };
  }, [view]);

  if (!data) return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "'Encode Sans Semi Condensed', sans-serif", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 40 }}>
      <div style={{ fontSize: 48, marginBottom: 20 }}>{program.icon}</div>
      <h2 style={{ fontFamily: "'Encode Sans Condensed'", fontSize: 28, fontWeight: 700, color: C.purple, marginBottom: 8 }}>{program.name}</h2>
      <p style={{ color: C.textMuted, fontSize: 15, marginBottom: 24 }}>Workout content coming soon — fill in the spreadsheet template to build this program.</p>
      <button onClick={onBack} style={{ padding: "12px 28px", background: accent, border: "none", borderRadius: 8, color: C.white, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>← Back to Programs</button>
    </div>
  );

  const advanceSet = (sid, key) => setCompletedSets(p => ({ ...p, [`${sid}-${key}`]: (p[`${sid}-${key}`] || 0) + 1 }));
  const toggleWarmup = (sid, i) => setCompletedWarmup(p => ({ ...p, [`${sid}-warmup-${i}`]: !p[`${sid}-warmup-${i}`] }));
  const setWeight = (sid, key, val) => setWeights(p => ({ ...p, [`${sid}-${key}`]: val }));
  const totalSessions = data.weeks.reduce((a, w) => a + w.sessions.length, 0);
  const completedCount = Object.values(completedSess).filter(Boolean).length;

  const isExDone = (sid, blockLabel, idx, sets) => (completedSets[`${sid}-${blockLabel}-${idx}`] || 0) >= sets;

  if (view === "session" && activeSession) {
    const s = activeSession;

    const warmupTotal = s.warmup.exercises.length;
    const warmupDone = s.warmup.exercises.filter((_, i) => completedWarmup[`${s.id}-warmup-${i}`]).length;
    let exTotal = 0, exDone = 0;
    s.blocks.forEach(b => b.exercises.forEach((ex, i) => { exTotal++; if (isExDone(s.id, b.label, i, ex.sets)) exDone++; }));
    const totalItems = warmupTotal + exTotal;
    const doneItems = warmupDone + exDone;
    const pct = totalItems > 0 ? Math.round(doneItems / totalItems * 100) : 0;
    const timeEst = estimateSessionTime(s);

    return (
      <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "'Encode Sans Semi Condensed', sans-serif" }}>
        <div style={{ maxWidth: 680, margin: "0 auto", padding: "0 20px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 0 10px" }}>
            <button onClick={() => { setActiveSession(null); setView("program"); }} style={{ background: "none", border: "none", color: accent, fontSize: 14, cursor: "pointer", fontWeight: 600 }}>← Back</button>
            <span style={{ fontSize: 11, color: C.textLight, fontWeight: 500 }}>{timeEst}</span>
          </div>
          <div style={{ textAlign: "center", paddingBottom: 24 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.15em", color: accent, fontWeight: 700, marginBottom: 6 }}>{s.dayLabel}</div>
            <h2 style={{ fontFamily: "'Encode Sans Condensed'", fontSize: 28, fontWeight: 700, margin: "0 0 12px", color: C.text }}>{s.name}</h2>
            <div style={{ width: "100%", height: 4, background: C.borderLight, borderRadius: 2, maxWidth: 300, margin: "0 auto", overflow: "hidden" }}><div style={{ height: "100%", width: `${pct}%`, background: accent, borderRadius: 2, transition: "width 0.4s" }} /></div>
            <div style={{ fontSize: 11, color: C.textMuted, marginTop: 6 }}>{doneItems}/{totalItems} complete</div>
          </div>

          </div>
          {w.sessions.map((sess, si) => { const done = completedSess[sess.id]; return (
            <div key={si} onClick={() => { setActiveSession(sess); setView("session"); }} style={{ background: done ? "rgba(22,163,106,0.05)" : C.white, border: `1px solid ${done ? "rgba(22,163,106,0.3)" : C.border}`, borderRadius: 10, padding: "16px 20px", marginBottom: 10, cursor: "pointer", transition: "all 0.2s" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: done ? C.success : accent, fontWeight: 700, marginBottom: 3 }}>{done ? "✓ Completed" : sess.dayLabel}</div>
                  <h4 style={{ fontFamily: "'Encode Sans Condensed'", fontSize: 19, margin: 0, fontWeight: 700, color: done ? C.textMuted : C.text }}>{sess.name}</h4>
                  <div style={{ fontSize: 12, color: C.textMuted, marginTop: 3 }}>{sess.blocks.reduce((a, b) => a + b.exercises.length, 0)} exercises · {estimateSessionTime(sess)}</div>
                </div>
                <span style={{ color: accent, fontSize: 18 }}>→</span>
              </div>
            </div>
          ); })}
        </div>); })()}
        <div style={{ height: 40 }} />
      </div>
    </div>
  );
}
